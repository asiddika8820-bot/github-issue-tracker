<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>github</title>
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>

    *{

   font-family: "Open Sans", sans-serif;
    }
</style>
</head>
<body class="mx-auto min-h-screen max-w-md bg-base-200 ">
    <div class="logo  mx-auto pt-32 text-center">
     <img  class="mx-auto"  src="./assets/github-logo.png " alt="">
     <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
     <p class="font-semibold text-[#64748B]">Sign in to manage your issues</p>


 
    </div>
    <div class="pt-10">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">User Name</label>
          <input id="user-name" maxlength="5" minlength="5" class="input rounded-full bg-base-200" placeholder="Enter User Name" />
          <p class="text-[#4A00ff]">Default: admin</p>
          
          <br>

          <label class="label text-neutral font-bold">Password</label>
           <input id="input-pass" type="password" maxlength="8" minlength="8" class="input rounded-full bg-base-200" placeholder="Enter your password" />
           <p class="text-[#4A00ff]">Default: admin123</p>
          
          <br>
          <button  id="Signin-btn" class="btn btn-primary rounded-full" >Sign in</button>
        </fieldset>

        <br>
        <div class="text-center">
        <p>OR</p>
<br> 
        <div class=" space-y-3 ">
            <p> Demo Credential</p>
        
<div class="bg-slate-200">
        <p> <span class="font-bold">Username:</span> admin</p>
        <p> <span class="font-bold">Password:</span> admin123</p>
        </div>
        </div>
        </div>
      </div>
    </div>
    </div>

    <script  src="script/login.js"></script>
</body>
</html>
